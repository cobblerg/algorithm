<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임으로 알아보는 알고리즘 - Algorithm Adventure</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Confetti JS -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', 'Roboto', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }

        .level-card.locked {
            filter: grayscale(1);
            opacity: 0.7;
            cursor: not-allowed;
        }

        .grid-cell {
            aspect-ratio: 1 / 1;
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        /* Animation for robot */
        .robot-move {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Sorting bar transition */
        .bar-transition {
            transition: transform 0.4s ease, height 0.4s ease;
        }

        .btn-scale:active {
            transform: scale(0.95);
        }

        /* Difficulty button active styles */
        .diff-btn-active {
            border-color: #4f46e5 !important;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
            background-color: white !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="goHome()">
                <div class="bg-indigo-600 p-1.5 rounded-lg">
                    <i data-lucide="cpu" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-lg font-bold text-gray-800 tracking-tight" id="header-title">게임으로 알아보는 알고리즘</h1>
            </div>
            
            <div class="flex items-center space-x-3">
                <button onclick="toggleLang()" class="px-3 py-1.5 border border-gray-300 rounded-full text-sm font-medium hover:bg-gray-50 flex items-center space-x-1">
                    <i data-lucide="languages" class="w-4 h-4"></i>
                    <span id="lang-toggle-text">EN</span>
                </button>
                <div id="difficulty-badge" class="hidden px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs font-bold uppercase tracking-wider"></div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-4xl mx-auto w-full p-4">
        <!-- Home Screen -->
        <section id="screen-home" class="space-y-6">
            <div class="text-center py-8">
                <h2 class="text-3xl font-extrabold text-gray-900 mb-2" id="welcome-msg">환영합니다, 미래의 개발자님!</h2>
                <p class="text-gray-600" id="welcome-sub">5단계의 알고리즘 모험을 통해 핵심 원리를 마스터하세요.</p>
            </div>

            <!-- Difficulty Selection -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-800 mb-4" id="select-diff-text">난이도 선택</h3>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="setDifficulty('easy')" id="btn-diff-easy" class="diff-btn p-4 rounded-xl border-2 transition-all flex flex-col items-center">
                        <i data-lucide="smile" class="w-8 h-8 mb-2"></i>
                        <span class="font-bold" id="label-easy">초급</span>
                    </button>
                    <button onclick="setDifficulty('medium')" id="btn-diff-medium" class="diff-btn p-4 rounded-xl border-2 transition-all flex flex-col items-center">
                        <i data-lucide="zap" class="w-8 h-8 mb-2"></i>
                        <span class="font-bold" id="label-medium">중급</span>
                    </button>
                    <button onclick="setDifficulty('hard')" id="btn-diff-hard" class="diff-btn p-4 rounded-xl border-2 transition-all flex flex-col items-center">
                        <i data-lucide="flame" class="w-8 h-8 mb-2"></i>
                        <span class="font-bold" id="label-hard">고급</span>
                    </button>
                </div>
            </div>

            <!-- Level Grid -->
            <div id="level-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Levels will be injected here -->
            </div>

            <div class="flex justify-center pt-4">
                <button onclick="confirmResetProgress()" class="text-gray-400 hover:text-red-500 text-sm flex items-center space-x-1 transition-colors">
                    <i data-lucide="refresh-ccw" class="w-4 h-4"></i>
                    <span id="reset-progress-text">현재 난이도 진도 초기화</span>
                </button>
            </div>
        </section>

        <!-- Game Screen -->
        <section id="screen-game" class="hidden space-y-4">
            <div class="flex items-center justify-between">
                <button onclick="goHome()" class="p-2 hover:bg-gray-200 rounded-full transition-colors">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </button>
                <div class="text-center">
                    <h2 id="game-title" class="text-xl font-bold text-gray-800"></h2>
                    <p id="game-step" class="text-xs text-indigo-600 font-bold uppercase tracking-widest"></p>
                </div>
                <button onclick="showHint()" class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors">
                    <i data-lucide="lightbulb" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- Game Container -->
            <div id="game-container" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 min-h-[350px] flex flex-col items-center justify-center relative overflow-hidden">
                <!-- Level Specific UI goes here -->
            </div>

            <!-- Control Bar -->
            <div class="grid grid-cols-2 gap-3">
                <button onclick="retryLevel()" class="flex items-center justify-center space-x-2 p-3 bg-gray-200 text-gray-700 rounded-xl font-bold btn-scale">
                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    <span id="btn-retry-text">다시하기</span>
                </button>
                <button id="primary-action-btn" class="flex items-center justify-center space-x-2 p-3 bg-indigo-600 text-white rounded-xl font-bold btn-scale shadow-lg shadow-indigo-200">
                    <i data-lucide="play" class="w-5 h-5"></i>
                    <span id="btn-action-text">실행하기</span>
                </button>
            </div>
        </section>
    </main>

    <!-- Modals -->
    <div id="modal-container" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
        <div id="modal-content" class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl transform transition-all scale-95 opacity-0">
            <div id="modal-icon" class="mb-4 flex justify-center"></div>
            <h3 id="modal-title" class="text-xl font-extrabold text-center text-gray-900 mb-2"></h3>
            <p id="modal-body" class="text-gray-600 text-center mb-6 leading-relaxed"></p>
            <div id="modal-footer" class="flex flex-col space-y-2">
                <!-- Buttons will be injected -->
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        const state = {
            lang: localStorage.getItem('algo_lang') || 'KO',
            difficulty: localStorage.getItem('algo_diff') || 'easy',
            unlockedLevels: [],
            completedLevels: [],
            currentLevel: 1,
            gameData: null,
            isProcessing: false
        };

        const i18n = {
            KO: {
                header: "게임으로 알아보는 알고리즘",
                welcome: "환영합니다, 미래의 개발자님!",
                welcomeSub: "5단계의 알고리즘 모험을 통해 핵심 원리를 마스터하세요.",
                selectDiff: "난이도 선택",
                easy: "초급", medium: "중급", hard: "고급",
                resetProgress: "현재 난이도 초기화",
                retry: "다시하기",
                execute: "실행하기",
                hint: "힌트",
                close: "닫기",
                next: "다음 단계로",
                confirmReset: "정말 초기화할까요?",
                resetMsg: "현재 난이도의 모든 진행 상황과 클리어 기록이 삭제됩니다.",
                cancel: "취소",
                success: "레벨 클리어!",
                failed: "다시 도전해 보세요!",
                check: "확인",
                levels: [
                    { t: "로봇 경로", d: "순차와 반복 제어" },
                    { t: "업다운 해킹", d: "이진 탐색의 효율성" },
                    { t: "막대 정렬", d: "데이터 정렬 알고리즘" },
                    { t: "도둑의 배낭", d: "탐욕적 선택(그리디)" },
                    { t: "최단 경로", d: "다익스트라 알고리즘" }
                ],
                hints: [
                    "목표 지점에 도달할 수 있는 명령어를 순서대로 예약하세요.",
                    "범위의 절반을 계속해서 줄여나가는 것이 이진 탐색의 핵심입니다.",
                    "가장 작은 값을 찾아 왼쪽으로 보내는 선택 정렬을 시뮬레이션 해보세요.",
                    "무게 대비 가치가 가장 높은 보석부터 채우는 것이 최선의 전략일까요?",
                    "현재 위치에서 가장 적은 비용이 드는 노드를 하나씩 연결해 보세요."
                ],
                principles: [
                    "순차(Sequence)는 명령어를 나열된 순서대로 실행하는 기초적인 제어 구조입니다.",
                    "이진 탐색(Binary Search)은 정렬된 데이터에서 탐색 범위를 절반씩 줄여 성능을 $O(\\log n)$으로 만듭니다.",
                    "정렬(Sorting)은 데이터를 일정한 규칙에 따라 나열하는 과정입니다. 선택 정렬은 매번 최소값을 찾는 방식입니다.",
                    "탐욕(Greedy) 알고리즘은 매 순간 최적이라고 생각되는 것을 선택하여 전체의 최적해를 구하려는 방법입니다.",
                    "다익스트라(Dijkstra) 알고리즘은 그래프 내에서 한 노드에서 다른 모든 노드까지의 최단 경로를 찾는 알고리즘입니다."
                ]
            },
            EN: {
                header: "Algorithm Adventure",
                welcome: "Welcome, Future Dev!",
                welcomeSub: "Master core principles through 5 levels of adventure.",
                selectDiff: "Select Difficulty",
                easy: "Easy", medium: "Medium", hard: "Hard",
                resetProgress: "Reset Current Progress",
                retry: "Retry",
                execute: "Execute",
                hint: "Hint",
                close: "Close",
                next: "Next Level",
                confirmReset: "Are you sure?",
                resetMsg: "All progress for the current difficulty will be cleared.",
                cancel: "Cancel",
                success: "Level Clear!",
                failed: "Try Again!",
                check: "Check",
                levels: [
                    { t: "Robot Path", d: "Sequential & Iterative Control" },
                    { t: "Up-Down Hack", d: "Efficiency of Binary Search" },
                    { t: "Bar Sorting", d: "Data Sorting Algorithms" },
                    { t: "Thief's Bag", d: "Greedy Optimization" },
                    { t: "Shortest Path", d: "Dijkstra's Algorithm" }
                ],
                hints: [
                    "Plan the movements in order to reach the goal flag.",
                    "The key to binary search is cutting the search range in half each time.",
                    "Try to find the smallest bar and move it to the leftmost position.",
                    "Is it always best to pick items with the highest value-to-weight ratio?",
                    "Connect the nodes starting with the lowest cost from your current position."
                ],
                principles: [
                    "Sequence is the fundamental structure where instructions are executed one by one in order.",
                    "Binary Search reduces the search space by half, resulting in $O(\\log n)$ performance on sorted data.",
                    "Sorting organizes data based on rules. Selection sort finds the minimum element repeatedly.",
                    "Greedy algorithms make the locally optimal choice at each step to find a global optimum.",
                    "Dijkstra's algorithm finds the shortest path between nodes in a graph."
                ]
            }
        };

        // --- Core UI Functions ---
        function t(key) { return i18n[state.lang][key] || key; }

        function loadProgress() {
            state.unlockedLevels = JSON.parse(localStorage.getItem(`algo_unlocked_${state.difficulty}`)) || [1];
            state.completedLevels = JSON.parse(localStorage.getItem(`algo_completed_${state.difficulty}`)) || [];
        }

        function saveProgress() {
            localStorage.setItem(`algo_unlocked_${state.difficulty}`, JSON.stringify(state.unlockedLevels));
            localStorage.setItem(`algo_completed_${state.difficulty}`, JSON.stringify(state.completedLevels));
        }

        function updateUI() {
            loadProgress();
            
            document.getElementById('header-title').innerText = t('header');
            document.getElementById('welcome-msg').innerText = t('welcome');
            document.getElementById('welcome-sub').innerText = t('welcomeSub');
            document.getElementById('select-diff-text').innerText = t('selectDiff');
            document.getElementById('label-easy').innerText = t('easy');
            document.getElementById('label-medium').innerText = t('medium');
            document.getElementById('label-hard').innerText = t('hard');
            document.getElementById('reset-progress-text').innerText = t('resetProgress');
            document.getElementById('lang-toggle-text').innerText = state.lang === 'KO' ? 'EN' : 'KO';
            document.getElementById('btn-retry-text').innerText = t('retry');
            document.getElementById('btn-action-text').innerText = t('execute');
            
            const diffBadge = document.getElementById('difficulty-badge');
            diffBadge.innerText = t(state.difficulty);
            diffBadge.classList.remove('hidden');

            const diffs = ['easy', 'medium', 'hard'];
            const colors = { easy: 'green', medium: 'yellow', hard: 'red' };
            diffs.forEach(d => {
                const btn = document.getElementById(`btn-diff-${d}`);
                btn.className = `diff-btn p-4 rounded-xl border-2 transition-all flex flex-col items-center border-${colors[d]}-200 bg-${colors[d]}-50 text-${colors[d]}-700 hover:bg-${colors[d]}-100`;
                if (state.difficulty === d) {
                    btn.classList.add('diff-btn-active', 'ring-4', `ring-indigo-300`);
                }
            });

            renderLevelGrid();
            lucide.createIcons();
        }

        function toggleLang() {
            state.lang = state.lang === 'KO' ? 'EN' : 'KO';
            localStorage.setItem('algo_lang', state.lang);
            updateUI();
            if (document.getElementById('screen-game').classList.contains('hidden') === false) {
                renderGameFrame();
            }
        }

        function setDifficulty(diff) {
            state.difficulty = diff;
            localStorage.setItem('algo_diff', diff);
            updateUI();
        }

        function renderLevelGrid() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            
            i18n[state.lang].levels.forEach((lv, index) => {
                const lvNum = index + 1;
                const isLocked = !state.unlockedLevels.includes(lvNum);
                const isCompleted = state.completedLevels.includes(lvNum);
                const card = document.createElement('div');
                card.className = `level-card p-5 rounded-2xl bg-white border border-gray-100 shadow-sm transition-all ${isLocked ? 'locked' : 'hover:shadow-md hover:-translate-y-1 cursor-pointer'}`;
                
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs font-bold text-indigo-500 uppercase">Level ${lvNum}</span>
                        ${isLocked ? '<i data-lucide="lock" class="w-4 h-4 text-gray-400"></i>' : (isCompleted ? '<i data-lucide="check-circle-2" class="w-4 h-4 text-green-500"></i>' : '<i data-lucide="unlock" class="w-4 h-4 text-blue-500"></i>')}
                    </div>
                    <h4 class="text-lg font-bold text-gray-800">${lv.t}</h4>
                    <p class="text-sm text-gray-500 mb-4">${lv.d}</p>
                    <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                        <div class="h-full bg-indigo-500 transition-all duration-500" style="width: ${isCompleted ? '100%' : '0%'}"></div>
                    </div>
                `;

                if (!isLocked) {
                    card.onclick = () => startLevel(lvNum);
                }
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function goHome() {
            document.getElementById('screen-home').classList.remove('hidden');
            document.getElementById('screen-game').classList.add('hidden');
            updateUI();
        }

        // --- Custom Modal System ---
        function showModal({ title, body, icon, buttons }) {
            const container = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            
            const iconEl = document.getElementById('modal-icon');
            iconEl.innerHTML = icon || '';
            
            const footer = document.getElementById('modal-footer');
            footer.innerHTML = '';
            
            buttons.forEach(btn => {
                const b = document.createElement('button');
                b.className = `p-3 rounded-xl font-bold transition-colors ${btn.primary ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`;
                b.innerText = btn.text;
                b.onclick = () => {
                    closeModal();
                    if (btn.onClick) btn.onClick();
                };
                footer.appendChild(b);
            });

            container.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
            }, 10);
            lucide.createIcons();
        }

        function closeModal() {
            const content = document.getElementById('modal-content');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                document.getElementById('modal-container').classList.add('hidden');
            }, 200);
        }

        function confirmResetProgress() {
            showModal({
                title: t('confirmReset'),
                body: t('resetMsg'),
                icon: '<div class="p-3 bg-red-100 rounded-full"><i data-lucide="alert-triangle" class="text-red-600 w-8 h-8"></i></div>',
                buttons: [
                    { text: t('cancel') },
                    { 
                        text: t('resetProgress'), 
                        primary: true, 
                        onClick: () => {
                            state.unlockedLevels = [1];
                            state.completedLevels = [];
                            saveProgress();
                            updateUI();
                        } 
                    }
                ]
            });
        }

        function showHint() {
            showModal({
                title: t('hint'),
                body: i18n[state.lang].hints[state.currentLevel - 1],
                icon: '<div class="p-3 bg-yellow-100 rounded-full"><i data-lucide="lightbulb" class="text-yellow-600 w-8 h-8"></i></div>',
                buttons: [{ text: t('close'), primary: true }]
            });
        }

        // --- Game Logic Controllers ---

        function startLevel(lv) {
            state.currentLevel = lv;
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            renderGameFrame();
            initLevelLogic();
        }

        function renderGameFrame() {
            const lvInfo = i18n[state.lang].levels[state.currentLevel - 1];
            document.getElementById('game-title').innerText = lvInfo.t;
            document.getElementById('game-step').innerText = `Level ${state.currentLevel}`;
            lucide.createIcons();
        }

        function retryLevel() {
            initLevelLogic();
        }

        function completeLevel() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });

            if (!state.completedLevels.includes(state.currentLevel)) {
                state.completedLevels.push(state.currentLevel);
            }

            const nextLevel = state.currentLevel + 1;
            if (!state.unlockedLevels.includes(nextLevel) && nextLevel <= 5) {
                state.unlockedLevels.push(nextLevel);
            }
            
            saveProgress();

            showModal({
                title: t('success'),
                body: i18n[state.lang].principles[state.currentLevel - 1],
                icon: '<div class="p-3 bg-green-100 rounded-full"><i data-lucide="party-popper" class="text-green-600 w-8 h-8"></i></div>',
                buttons: [
                    { text: t('check'), onClick: goHome },
                    nextLevel <= 5 ? { text: t('next'), primary: true, onClick: () => startLevel(nextLevel) } : null
                ].filter(Boolean)
            });
        }

        // --- Specific Level Implementations ---

        function initLevelLogic() {
            const container = document.getElementById('game-container');
            container.innerHTML = '';
            const actionBtn = document.getElementById('primary-action-btn');
            actionBtn.disabled = false;
            
            state.isProcessing = false;

            switch(state.currentLevel) {
                case 1: setupLevel1(container); break;
                case 2: setupLevel2(container); break;
                case 3: setupLevel3(container); break;
                case 4: setupLevel4(container); break;
                case 5: setupLevel5(container); break;
            }
        }

        // LEVEL 1: Robot Path (Fixed Obstacle Check)
        function setupLevel1(container) {
            const size = state.difficulty === 'easy' ? 4 : (state.difficulty === 'medium' ? 5 : 6);
            let grid = [];
            let robotPos = { x: 0, y: 0 };
            let goalPos = { x: size - 1, y: size - 1 };

            // BFS to verify if path exists
            function isPathPossible(g) {
                let q = [[0, 0]];
                let visited = new Set(['0,0']);
                while(q.length > 0) {
                    let [cx, cy] = q.shift();
                    if(cx === size-1 && cy === size-1) return true;
                    
                    [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                        let nx = cx + dx, ny = cy + dy;
                        if(nx >= 0 && nx < size && ny >= 0 && ny < size && g[ny][nx] === 0 && !visited.has(`${nx},${ny}`)) {
                            visited.add(`${nx},${ny}`);
                            q.push([nx, ny]);
                        }
                    });
                }
                return false;
            }

            // Generate solvable grid
            let solvable = false;
            let attempts = 0;
            while(!solvable && attempts < 100) {
                grid = Array(size).fill().map(() => Array(size).fill(0));
                const obsCount = Math.floor(size * size * 0.2);
                for(let i=0; i<obsCount; i++) {
                    let rx = Math.floor(Math.random()*size);
                    let ry = Math.floor(Math.random()*size);
                    if((rx===0 && ry===0) || (rx===size-1 && ry===size-1)) continue;
                    grid[ry][rx] = 1;
                }
                if(isPathPossible(grid)) solvable = true;
                attempts++;
            }

            let commands = [];
            const renderGrid = () => {
                container.innerHTML = `
                    <div class="grid gap-1 mb-4" style="grid-template-columns: repeat(${size}, minmax(0, 1fr)); width: 280px;">
                        ${grid.map((row, y) => row.map((cell, x) => `
                            <div class="grid-cell border rounded-md flex items-center justify-center relative ${cell === 1 ? 'bg-gray-800 text-white' : 'bg-indigo-50'}">
                                ${x === robotPos.x && y === robotPos.y ? '<span class="robot-move text-2xl">🤖</span>' : ''}
                                ${x === goalPos.x && y === goalPos.y ? '<span class="text-2xl">🚩</span>' : ''}
                                ${cell === 1 ? '<i data-lucide="box" class="w-5 h-5 opacity-40"></i>' : ''}
                            </div>
                        `).join('')).join('')}
                    </div>
                    <div class="w-full">
                        <div class="flex flex-wrap gap-2 justify-center mb-4 min-h-[40px]" id="l1-command-queue">
                            ${commands.map((cmd, idx) => `<div class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-bold">${cmd}</div>`).join('')}
                            ${commands.length === 0 ? `<span class="text-gray-400 text-sm italic">${state.lang === 'KO' ? '명령어를 입력하세요' : 'Enter commands'}</span>` : ''}
                        </div>
                        <div class="grid grid-cols-4 gap-2 px-4">
                            <button onclick="window.addL1Cmd('UP')" class="p-2 bg-gray-100 rounded-lg hover:bg-gray-200"><i data-lucide="chevron-up" class="mx-auto"></i></button>
                            <button onclick="window.addL1Cmd('DOWN')" class="p-2 bg-gray-100 rounded-lg hover:bg-gray-200"><i data-lucide="chevron-down" class="mx-auto"></i></button>
                            <button onclick="window.addL1Cmd('LEFT')" class="p-2 bg-gray-100 rounded-lg hover:bg-gray-200"><i data-lucide="chevron-left" class="mx-auto"></i></button>
                            <button onclick="window.addL1Cmd('RIGHT')" class="p-2 bg-gray-100 rounded-lg hover:bg-gray-200"><i data-lucide="chevron-right" class="mx-auto"></i></button>
                            <button onclick="window.undoL1Cmd()" class="col-span-4 p-2 bg-red-50 text-red-600 rounded-lg font-bold text-xs hover:bg-red-100">UNDO</button>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            };

            window.addL1Cmd = (dir) => { 
                if(commands.length < 15) { commands.push(dir); renderGrid(); } 
            };
            window.undoL1Cmd = () => { commands.pop(); renderGrid(); };
            
            document.getElementById('primary-action-btn').onclick = async () => {
                if(state.isProcessing || commands.length === 0) return;
                state.isProcessing = true;
                
                let tempPos = { x: 0, y: 0 };
                for(let cmd of commands) {
                    if(cmd === 'UP') tempPos.y--;
                    if(cmd === 'DOWN') tempPos.y++;
                    if(cmd === 'LEFT') tempPos.x--;
                    if(cmd === 'RIGHT') tempPos.x++;
                    
                    robotPos = { ...tempPos };
                    renderGrid();
                    await new Promise(r => setTimeout(r, 400));
                    
                    if(robotPos.x < 0 || robotPos.x >= size || robotPos.y < 0 || robotPos.y >= size || grid[robotPos.y][robotPos.x] === 1) {
                        showModal({ title: t('failed'), body: state.lang === 'KO' ? "벽이나 장애물에 부딪혔습니다!" : "You hit a wall or obstacle!", buttons: [{ text: t('retry'), onClick: retryLevel }] });
                        return;
                    }
                }
                
                if(robotPos.x === goalPos.x && robotPos.y === goalPos.y) {
                    completeLevel();
                } else {
                    showModal({ title: t('failed'), body: state.lang === 'KO' ? "목표에 도달하지 못했습니다." : "Goal not reached.", buttons: [{ text: t('retry'), onClick: retryLevel }] });
                }
            };

            renderGrid();
        }

        // LEVEL 2: Up-Down Binary Search
        function setupLevel2(container) {
            const range = state.difficulty === 'easy' ? 100 : (state.difficulty === 'medium' ? 500 : 1000);
            const maxLife = state.difficulty === 'easy' ? 7 : (state.difficulty === 'medium' ? 9 : 10);
            const target = Math.floor(Math.random() * range) + 1;
            let life = maxLife;
            let history = [];

            container.innerHTML = `
                <div class="text-center w-full max-w-xs space-y-6">
                    <div class="bg-indigo-600 p-8 rounded-3xl text-white shadow-inner">
                        <p class="text-sm opacity-80 uppercase tracking-widest mb-1">Target Range</p>
                        <h3 class="text-4xl font-black">1 ~ ${range}</h3>
                    </div>
                    <div class="flex justify-between items-center text-sm font-bold text-gray-500">
                        <span>LIFE: <span id="l2-life" class="text-red-500">${life}</span> / ${maxLife}</span>
                        <span id="l2-status" class="text-indigo-600">준비 완료</span>
                    </div>
                    <input type="number" id="l2-input" class="w-full p-4 border-2 border-gray-200 rounded-xl text-center text-2xl font-bold focus:border-indigo-500 outline-none" placeholder="?">
                    <div id="l2-history" class="h-20 overflow-y-auto text-xs text-gray-400 flex flex-wrap gap-1 justify-center"></div>
                </div>
            `;

            const input = document.getElementById('l2-input');
            const actionBtn = document.getElementById('primary-action-btn');
            
            actionBtn.onclick = () => {
                const val = parseInt(input.value);
                if(isNaN(val)) return;
                
                life--;
                document.getElementById('l2-life').innerText = life;
                
                let res = "";
                if(val === target) {
                    completeLevel();
                    return;
                } else if (val < target) {
                    res = "UP ⬆️";
                } else {
                    res = "DOWN ⬇️";
                }
                
                history.push(`${val}: ${res}`);
                document.getElementById('l2-status').innerText = res;
                document.getElementById('l2-history').innerHTML = history.map(h => `<span class="bg-gray-100 px-2 py-1 rounded">${h}</span>`).join('');
                input.value = '';
                input.focus();

                if(life <= 0 && val !== target) {
                    showModal({ title: t('failed'), body: `${state.lang === 'KO' ? "모든 기회를 소진했습니다. 정답은" : "Out of lives! The answer was"} ${target}`, buttons: [{ text: t('retry'), onClick: retryLevel }] });
                }
            };
        }

        // LEVEL 3: Selection Sorting
        function setupLevel3(container) {
            const count = state.difficulty === 'easy' ? 5 : (state.difficulty === 'medium' ? 7 : 10);
            let bars = Array.from({length: count}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let selected = [];

            const renderBars = () => {
                container.innerHTML = `
                    <p class="text-sm text-gray-500 mb-6 font-medium text-center px-4">${state.lang === 'KO' ? "두 막대를 클릭해 위치를 교환하여 오름차순으로 정렬하세요!" : "Click two bars to swap and sort them in ascending order!"}</p>
                    <div class="flex items-end justify-center space-x-2 h-48 w-full px-4">
                        ${bars.map((val, idx) => `
                            <div onclick="window.selectBar(${idx})" class="bar-transition cursor-pointer rounded-t-lg flex flex-col items-center justify-end ${selected.includes(idx) ? 'bg-indigo-600 scale-105 shadow-lg' : 'bg-indigo-300 hover:bg-indigo-400'}" 
                                 style="height: ${(val / count) * 100}%; width: 30px;">
                                <span class="text-[10px] font-bold text-white mb-1">${val}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            };

            window.selectBar = (idx) => {
                if(selected.includes(idx)) {
                    selected = [];
                } else {
                    selected.push(idx);
                    if(selected.length === 2) {
                        let temp = bars[selected[0]];
                        bars[selected[0]] = bars[selected[1]];
                        bars[selected[1]] = temp;
                        selected = [];
                        
                        const isSorted = bars.every((v, i) => i === 0 || v >= bars[i-1]);
                        if(isSorted) {
                            renderBars();
                            setTimeout(completeLevel, 500);
                        }
                    }
                }
                renderBars();
            };

            document.getElementById('primary-action-btn').onclick = () => {
                const isSorted = bars.every((v, i) => i === 0 || v >= bars[i-1]);
                if(isSorted) completeLevel();
                else showModal({ title: t('failed'), body: state.lang === 'KO' ? "아직 정렬되지 않았습니다." : "Not sorted yet.", buttons: [{ text: t('check') }] });
            };

            renderBars();
        }

        // LEVEL 4: Greedy Knapsack
        function setupLevel4(container) {
            const capacity = state.difficulty === 'easy' ? 30 : (state.difficulty === 'medium' ? 50 : 80);
            const items = [];
            const count = 5;
            const emojis = ['💎', '💰', '👑', '📦', '🎁'];
            
            for(let i=0; i<count; i++) {
                items.push({
                    id: i,
                    weight: Math.floor(Math.random() * 15) + 5,
                    value: Math.floor(Math.random() * 50) + 10,
                    emoji: emojis[i % emojis.length]
                });
            }

            const sortedItems = [...items].sort((a, b) => (b.value/b.weight) - (a.value/a.weight));
            let optVal = 0;
            let tempCap = capacity;
            for(let item of sortedItems) {
                if(tempCap >= item.weight) {
                    optVal += item.value;
                    tempCap -= item.weight;
                }
            }
            
            let currentWeight = 0;
            let currentValue = 0;
            let selectedIds = [];

            const renderKnapsack = () => {
                container.innerHTML = `
                    <div class="w-full text-center space-y-4">
                        <div class="flex justify-between items-center px-4">
                            <div class="text-left">
                                <p class="text-xs text-gray-500 font-bold uppercase">Weight</p>
                                <p class="text-xl font-black ${currentWeight > capacity ? 'text-red-500' : 'text-gray-800'}">${currentWeight} / ${capacity}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-gray-500 font-bold uppercase">Goal Value</p>
                                <p class="text-xl font-black text-indigo-600">≥ ${optVal}</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-5 gap-2 px-2">
                            ${items.map(item => `
                                <div onclick="window.toggleItem(${item.id})" class="cursor-pointer p-2 border-2 rounded-xl transition-all ${selectedIds.includes(item.id) ? 'border-indigo-500 bg-indigo-50' : 'border-gray-100 hover:border-gray-200'}">
                                    <div class="text-2xl mb-1">${item.emoji}</div>
                                    <div class="text-[10px] text-gray-400 font-bold">${item.weight}kg</div>
                                    <div class="text-xs text-indigo-600 font-bold">$${item.value}</div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="p-4 bg-gray-50 rounded-2xl flex items-center justify-center space-x-2">
                            <span class="text-sm font-bold text-gray-500">Total Value:</span>
                            <span class="text-2xl font-black text-indigo-600">$${currentValue}</span>
                        </div>
                    </div>
                `;
            };

            window.toggleItem = (id) => {
                if(selectedIds.includes(id)) {
                    selectedIds = selectedIds.filter(i => i !== id);
                } else {
                    selectedIds.push(id);
                }
                
                currentWeight = 0;
                currentValue = 0;
                items.forEach(item => {
                    if(selectedIds.includes(item.id)) {
                        currentWeight += item.weight;
                        currentValue += item.value;
                    }
                });
                renderKnapsack();
            };

            document.getElementById('primary-action-btn').onclick = () => {
                if(currentWeight > capacity) {
                    showModal({ title: t('failed'), body: state.lang === 'KO' ? "배낭이 너무 무겁습니다!" : "The bag is too heavy!", buttons: [{ text: t('check') }] });
                } else if(currentValue >= optVal) {
                    completeLevel();
                } else {
                    showModal({ title: t('failed'), body: state.lang === 'KO' ? "더 높은 가치를 만들 수 있습니다." : "You can achieve more value.", buttons: [{ text: t('check') }] });
                }
            };

            renderKnapsack();
        }

        // LEVEL 5: Dijkstra Shortest Path
        function setupLevel5(container) {
            const nodeCount = state.difficulty === 'easy' ? 5 : (state.difficulty === 'medium' ? 7 : 9);
            const nodes = [];
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            
            for(let i=0; i<nodeCount; i++) {
                nodes.push({
                    id: alphabet[i],
                    x: 10 + Math.random() * 80,
                    y: 15 + Math.random() * 70
                });
            }
            
            const edges = [];
            for(let i=0; i<nodeCount; i++) {
                for(let j=i+1; j<nodeCount; j++) {
                    if(Math.random() > 0.5) {
                        edges.push({ u: nodes[i].id, v: nodes[j].id, weight: Math.floor(Math.random() * 8) + 1 });
                    }
                }
            }

            for(let i=0; i<nodeCount-1; i++) {
                if(!edges.find(e => (e.u === nodes[i].id && e.v === nodes[i+1].id) || (e.v === nodes[i].id && e.u === nodes[i+1].id))) {
                    edges.push({ u: nodes[i].id, v: nodes[i+1].id, weight: Math.floor(Math.random() * 5) + 2 });
                }
            }

            const dist = {};
            const graph = {};
            nodes.forEach(n => { dist[n.id] = Infinity; graph[n.id] = []; });
            edges.forEach(e => {
                graph[e.u].push({ to: e.v, w: e.weight });
                graph[e.v].push({ to: e.u, w: e.weight });
            });
            
            const startNode = nodes[0].id;
            const endNode = nodes[nodeCount-1].id;
            dist[startNode] = 0;
            const q = [startNode];
            const visited = new Set();
            
            while(q.length > 0) {
                q.sort((a,b) => dist[a] - dist[b]);
                const curr = q.shift();
                if(visited.has(curr)) continue;
                visited.add(curr);
                
                graph[curr].forEach(edge => {
                    const newDist = dist[curr] + edge.w;
                    if(newDist < dist[edge.to]) {
                        dist[edge.to] = newDist;
                        q.push(edge.to);
                    }
                });
            }

            const targetDist = dist[endNode];
            let userPath = [startNode];
            let userDist = 0;

            const renderGraph = () => {
                container.innerHTML = `
                    <div class="w-full text-center mb-2">
                        <div class="flex justify-between items-center text-xs font-bold text-gray-500 px-2">
                            <span>START: ${startNode} → END: ${endNode}</span>
                            <span class="text-indigo-600 font-bold">SHORTEST TARGET: ${targetDist}</span>
                        </div>
                        <div class="mt-1 text-sm font-black text-indigo-700">CURRENT PATH COST: ${userDist}</div>
                    </div>
                    <div class="relative w-full h-64 bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                        <svg class="w-full h-full">
                            ${edges.map(e => {
                                const n1 = nodes.find(n => n.id === e.u);
                                const n2 = nodes.find(n => n.id === e.v);
                                const uIdx = userPath.indexOf(e.u);
                                const vIdx = userPath.indexOf(e.v);
                                const isUserEdge = uIdx !== -1 && vIdx !== -1 && Math.abs(uIdx - vIdx) === 1;
                                return `
                                    <line x1="${n1.x}%" y1="${n1.y}%" x2="${n2.x}%" y2="${n2.y}%" stroke="${isUserEdge ? '#4f46e5' : '#cbd5e1'}" stroke-width="${isUserEdge ? 4 : 2}" />
                                    <text x="${(n1.x + n2.x)/2}%" y="${(n1.y + n2.y)/2}%" fill="${isUserEdge ? '#4f46e5' : '#64748b'}" font-size="12" font-weight="bold" dy="-5">${e.weight}</text>
                                `;
                            }).join('')}
                            ${nodes.map(n => {
                                const isSelected = userPath.includes(n.id);
                                const isLast = userPath[userPath.length - 1] === n.id;
                                return `
                                    <circle cx="${n.x}%" cy="${n.y}%" r="15" fill="${isLast ? '#4f46e5' : (isSelected ? '#818cf8' : 'white')}" stroke="#4f46e5" stroke-width="2" class="cursor-pointer transition-colors" onclick="window.clickNode('${n.id}')" />
                                    <text x="${n.x}%" y="${n.y}%" text-anchor="middle" dy=".3em" fill="${isSelected ? 'white' : '#4f46e5'}" font-size="10" font-weight="bold" class="pointer-events-none">${n.id}</text>
                                `;
                            }).join('')}
                        </svg>
                    </div>
                    <p class="mt-4 text-[10px] text-gray-400 font-medium text-center">노드를 차례로 클릭해 연결하세요. 현재 발판을 다시 누르면 뒤로 갑니다.</p>
                `;
            };

            window.clickNode = (id) => {
                const last = userPath[userPath.length - 1];
                if(last === id && userPath.length > 1) {
                    const prev = userPath[userPath.length - 2];
                    const edge = edges.find(e => (e.u === last && e.v === prev) || (e.v === last && e.u === prev));
                    userDist -= edge.weight;
                    userPath.pop();
                } else {
                    const edge = edges.find(e => (e.u === last && e.v === id) || (e.v === last && e.u === id));
                    if(edge && !userPath.includes(id)) {
                        userDist += edge.weight;
                        userPath.push(id);
                    }
                }
                renderGraph();
            };

            document.getElementById('primary-action-btn').onclick = () => {
                if(userPath[userPath.length - 1] === endNode) {
                    if(userDist === targetDist) {
                        completeLevel();
                    } else {
                        showModal({ title: t('failed'), body: state.lang === 'KO' ? `도착은 했지만 최단 거리가 아닙니다. (현재: ${userDist}, 최단: ${targetDist})` : `Reached goal, but not the shortest path. (Current: ${userDist}, Shortest: ${targetDist})`, buttons: [{ text: t('check') }] });
                    }
                } else {
                    showModal({ title: t('failed'), body: state.lang === 'KO' ? "도착 지점까지 경로를 완성하세요." : "Complete the path to the end node.", buttons: [{ text: t('check') }] });
                }
            };

            renderGraph();
        }

        // --- Init ---
        window.onload = () => {
            updateUI();
        };
    </script>
</body>
</html>
